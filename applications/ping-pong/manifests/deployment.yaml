apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: exercises
  name: ping-pong

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ping-pong

  template:
    metadata:
      labels:
        app: ping-pong

    spec:
      containers:
        - name: ping-pong
          image: ping-pong:2.7
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          env:
            - name: PORT
              value: "3000"

            - name: POSTGRES_HOST
              value: postgres-svc

            - name: POSTGRES_PORT
              value: "5432"

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

            - name: POSTGRES_DB
              value: pingpong
