apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared-log
          persistentVolumeClaim:
            claimName: shared-log-claim
      containers:
        - name: ping-pong
          image: ping-pong:1.11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files
