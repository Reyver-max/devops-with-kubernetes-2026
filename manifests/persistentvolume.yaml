apiVersion: v1
kind: PersistentVolume
metadata:
  name: shared-log-pv
spec:
  storageClassName: shared-log-storage
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  local:
    path: /tmp/kube
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3d-another-cluster-agent-0
